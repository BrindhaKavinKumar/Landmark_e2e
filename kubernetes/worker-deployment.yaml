apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-worker
  template:
    metadata:
      labels:
        app: retail-worker
    spec:
      containers:
        - name: retail-worker
          image: retail-worker:latest
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: worker-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: worker-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: worker-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: worker-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: DB_PASSWORD