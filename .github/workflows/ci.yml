name: Retail Data Pipeline CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          cd worker-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Basic syntax check (VERY IMPORTANT)
      - name: Validate Python imports
        run: |
          cd worker-service
          python -m compileall .

      # 5. Run a simple dry-run import test
      - name: Run app import test
        run: |
          cd worker-service
          python -c "from app.processor import process_message; print('Import OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t retail-worker ./worker-service
